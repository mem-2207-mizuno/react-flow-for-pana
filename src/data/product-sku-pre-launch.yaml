            required: true
        outputs:
          - id: checked-story
            label: チェック済構成案
            dataType: html
            description: ハルシネーションチェック済の構成案

      - id: hallcheck-who
        name: ハルシネーションチェック（Who Ver）
        category: llm
        summary: Who重視構成案を現行サイトと照合してファクトチェック
        description: |
          Who重視構成案の内容を現行サイトの情報と照合し、
          事実と異なる記述やハルシネーションがないかチェックする。
        inputs:
          - id: story-draft
            label: 構成案
            dataType: html
            description: チェック対象の構成案
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: ファクトチェック用の正解データ
            required: true
        outputs:
          - id: checked-story
            label: チェック済構成案
            dataType: html
            description: ハルシネーションチェック済の構成案

      # ── 各セクションに統合 ──
      - id: section-integrate
        name: 各セクションに統合
        category: llm
        summary: 3つのチェック済構成案をセクション構成に統合
        description: |
          Why/What/Who各重視バージョンのチェック済構成案を、
          セクション一覧に沿って統合し比較一覧を作成する。
          各案の記述の有無、数値の差異、表現のトーンの違いをハイライト付きで集約。
          統合の選定は生成AIを使わず3社で協議の上決定する。
        inputs:
          - id: checked-why
            label: チェック済（Why Ver）
            dataType: html
            description: ハルシネーションチェック済のWhy重視構成案
            required: true
          - id: checked-what
            label: チェック済（What Ver）
            dataType: html
            description: ハルシネーションチェック済のWhat重視構成案
            required: true
          - id: checked-who
            label: チェック済（Who Ver）
            dataType: html
            description: ハルシネーションチェック済のWho重視構成案
            required: true
          - id: section-list
            label: セクション一覧
            dataType: json
            description: サイトのセクション構成一覧（15セクション）
            required: true
        outputs:
          - id: integrated-story
            label: セクション統合ストーリー
            dataType: html
            description: セクション別に統合されたストーリー
        artifacts:
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/na0k/section-integrate.html

      # ── 最終版ストーリー ──
      - id: final-story
        name: 最終版ストーリー
        category: output
        summary: 統合結果から最終版サイトストーリーを出力
        description: |
          3社協議の上確定したセクションの内容に基づき、一つのストーリーとして出力する。
        inputs:
          - id: integrated-story
            label: セクション統合ストーリー
            dataType: html
            description: 統合済みのストーリー
            required: true
        outputs:
          - id: final-output
            label: 最終版ストーリー
            dataType: html
            description: 最終版サイトストーリー（HTML形式）
        artifacts:
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/na0k/final-story.html

