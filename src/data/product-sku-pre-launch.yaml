meta:
  id: product-sku-pre-launch
  title: 製品軸（品番別）サイトストーリー生成フロー
  description: |
    顧客理解（Why/What/Who）を起点に、サイトストーリーを生成するフロー。
    製品タイプに応じてヘアドライヤー（NA0K型）と炊飯器（N510D型）を切り替え可能。
  version: "2.0"

preconditions:
  - key: product-type
    label: 製品タイプ
    options:
      - label: na0k
        description: ヘアドライヤー（NA0K）— 3構成案(Why/What/Who重視)ベース
      - label: n510d
        description: 炊飯器（N510D）— 3データソース(ドライヤーStory/PIM/現行サイト)ベース

steps:
  # ─── インプットデータ ───
  - id: config-params
    name: 品番・競合設定
    category: input
    summary: 分析対象の自社品番と競合品番を設定
    description: |
      分析の起点となるパラメータ。自社製品の品番と、比較対象となる競合製品の品番を指定する。
    inputs: []
    outputs:
      - id: own-product
        label: 自社品番
        dataType: string
        description: 分析対象の自社製品品番
      - id: competitor-products
        label: 競合品番
        dataType: string
        description: 比較対象の競合製品品番（複数）

  - id: input-data
    name: インプットデータ群
    category: input
    summary: 前モデル＋競合の各種データソース
    description: |
      プロジェクトナレッジとして事前に格納された各種データソース群。
      これらがLLM分析ステップのコンテキスト情報として利用される。
    inputs: []
    outputs:
      - id: store-report
        label: 店頭接点レポート
        dataType: json
        description: 店頭での顧客接点に関するレポート（PDF/構造化データ）
      - id: reviews
        label: レビューデータ
        dataType: json
        description: Amazon・楽天等のレビューデータ（CSV/非構造化データ）
      - id: msc-report
        label: MSCレポート
        dataType: json
        description: 購入理由・満足度に関する調査レポート（PDF/構造化データ）
      - id: web-site
        label: 製品Webサイト
        dataType: json
        description: 現行の製品Webサイト情報（PDF+HTML/非構造化データ）
      - id: brand-survey
        label: 定点ブランド調査
        dataType: json
        description: ブランド認知・イメージに関する定点調査（PDF/構造化データ）
      - id: voc
        label: お客様相談センター VoC
        dataType: json
        description: お客様相談センターに寄せられた声（CSV/非構造化データ）
      - id: purchase-survey
        label: 購入者アンケート
        dataType: json
        description: 購入者へのアンケート結果（構造化データ）

  - id: story-input-data
    name: ストーリー生成インプット
    category: input
    summary: サイトストーリー生成用の参照データ
    description: |
      サイトストーリー生成に必要な参照データ群。
      現行サイト、商品プロモ現行サイト、PIM情報、ドライヤーStory、セクション一覧を含む。
    inputs: []
    outputs:
      - id: current-site
        label: 現行サイト
        dataType: html
        description: 現行の製品Webサイトコンテンツ（ハルシネーションチェック用の正解データ）
      - id: promo-site
        label: 商品プロモ現行サイト
        dataType: json
        description: 商品プロモ検討会の資料内「Webサイト構成案」
      - id: pim-data
        label: PIM情報
        dataType: json
        description: Product Information Management データ（製品スペック・特長テキスト）
      - id: dryer-story
        label: ドライヤーStory
        dataType: html
        description: NA0Kの完成版ストーリー（構成・トーン&マナーの参照用）
      - id: section-list
        label: セクション一覧
        dataType: json
        description: サイトのセクション構成一覧

  # ─── Why分析 ───
  - id: why-analysis
    name: Why分析
    category: llm
    summary: 顧客のJob・ペインポイント・購買トリガーを分析
    description: |
      顧客の根本的なニーズと動機を包括的に分析する。
      顧客のJob（機能的・感情的・社会的）、ペインポイント、購入動機・Why、
      購入トリガー（Life Change / Crisis / Inspiration）を抽出する。
    inputs:
      - id: own-product
        label: 自社品番
        dataType: string
        description: 分析対象の自社製品品番
        required: true
      - id: competitor-products
        label: 競合品番
        dataType: string
        description: 比較対象の競合製品品番
        required: true
      - id: context-data
        label: コンテキストデータ
        dataType: json
        description: プロジェクトナレッジ（前モデル＋競合の各種データ）
        required: true
    outputs:
      - id: why-result
        label: Why分析結果
        dataType: html
        description: "Job分析・ペインポイント・購入動機・トリガー分析の結果"
      - id: triggers
        label: 購買トリガー
        dataType: html
        description: "抽出された購買トリガー一覧（Life Change / Crisis / Inspiration）"
    prompt:
      template: |
        【あなたの役割】
        あなたはマーケティング戦略とユーザーインサイト分析の専門家です。顧客の根本的なニーズと動機を包括的に分析してください。

        【分析対象】
        #自社製品
        {{own_product}}

        #競合製品
        {{competitor_products}}

        【タスク内容】
        以下の項目を詳細に分析してください：
        1. **顧客のJob（進歩）分析**
           - 機能的Job：顧客がある状況で「やりたいこと」「達成したいこと」としてのタスク
           - 感情的Job：顧客が「自分自身がどう感じたいか」という内面的な欲求
           - 社会的Job：顧客が「他者からどう見られたいか」という社会的欲求
        2. **ペインポイント**
           - 顧客がジョブを完了させる上で直面している障害・不満・不便・リスク
        3. **購入動機とWhy（顧客ニーズ）**
        4. **購入トリガー分析**
           - Life Change（ライフ変化）トリガー
           - Crisis（危機・問題発生）トリガー
           - Inspiration（刺激・発見）トリガー

        【出力条件】
        - 各項目の因果関係を明確に示してください
        - デモグラフィック属性ではなく、行動特性・価値観に基づいて分析
        - 機能的Job、感情的Job、社会的Jobについてそれぞれ10個ずつ出力
      variables:
        - name: own_product
          source: config-params.own-product
          description: 自社製品品番
        - name: competitor_products
          source: config-params.competitor-products
          description: 競合製品品番
    metadata:
      output_name: why_品番別_ローンチ前
      scenes: "4P企画, Webサイト制作, SNS/広告TD/コピー, セールストーク"

  # ─── What分析 ───
  - id: what-analysis
    name: What分析
    category: llm
    summary: 製品のUSP・差別化要素・ベネフィットを分析
    description: |
      Why分析で抽出したトリガーに対して、自社製品の差別化要素を顧客データに基づいて分析する。
      顧客重視軸の抽出、What(製品)分析、メーカー視点と顧客視点のギャップ分析、
      競合分析、ベネフィット分析、USP定義を行う。
    inputs:
      - id: own-product
        label: 自社品番
        dataType: string
        description: 分析対象の自社製品品番
        required: true
      - id: competitor-products
        label: 競合品番
        dataType: string
        description: 比較対象の競合製品品番
        required: true
      - id: trigger
        label: 分析対象トリガー
        dataType: string
        description: Why分析で特定されたトリガー（=Whyとして分析の軸になる）
        required: true
      - id: context-data
        label: コンテキストデータ
        dataType: json
        description: プロジェクトナレッジ（前モデル＋競合の各種データ）
        required: true
    outputs:
      - id: what-result
        label: What分析結果
        dataType: html
        description: "USP・差別化・ベネフィット・競合分析の結果"
      - id: usp
        label: USP
        dataType: string
        description: "分析対象トリガーに対するコアUSP"
    prompt:
      template: |
        【あなたの役割】
        あなたは製品マーケティングの専門家であり、マーケティングコンサルタントです。
        自社製品の差別化要素を顧客データに基づいて包括的に分析し、戦略フレームワークを構築してください。

        【分析対象】
        #自社製品
        {{own_product}}
        #競合製品
        {{competitor_products}}

        【分析対象トリガー】
        #トリガー
        {{trigger}}

        【タスク内容】
        ## 顧客重視軸の抽出（データソース別分析）
        ## What(製品・サービス)分析
        ## メーカー視点と顧客視点での評価ギャップ
        ## 競合分析の実施
        ## ベネフィット(機能的/感情的/社会的)
        ## ベネフィット競合の発見と分析
        ## 主要な差別化要素
        ## USP定義
      variables:
        - name: own_product
          source: config-params.own-product
          description: 自社製品品番
        - name: competitor_products
          source: config-params.competitor-products
          description: 競合製品品番
        - name: trigger
          source: why-analysis.triggers
          description: Why分析で特定された購買トリガー
    metadata:
      output_name: what_品番別_ローンチ前
      scenes: "4P企画, SNS/広告TD/コピー, セールストーク"

  # ─── Who分析 ───
  - id: who-analysis
    name: Who分析
    category: llm
    summary: ターゲット顧客像・利用シーン・製品導入後の変化を分析
    description: |
      Why/What分析の結果を踏まえ、ターゲット顧客像を分析する。
      顧客特性（心理的・行動的）、利用シーンと状況設定、
      製品導入による生活変化・感情変化を抽出する。
    inputs:
      - id: own-product
        label: 自社品番
        dataType: string
        description: 分析対象の自社製品品番
        required: true
      - id: competitor-products
        label: 競合品番
        dataType: string
        description: 比較対象の競合製品品番
        required: true
      - id: trigger
        label: 分析対象トリガー
        dataType: string
        description: Why分析で特定されたトリガー
        required: true
      - id: why-result
        label: Why分析結果
        dataType: html
        description: Why分析の結果（Job/ペインポイント/トリガー）
        required: true
      - id: what-result
        label: What分析結果
        dataType: html
        description: What分析の結果（USP/差別化/ベネフィット）
        required: true
    outputs:
      - id: who-result
        label: Who分析結果
        dataType: html
        description: "顧客像・利用シーン・製品導入後変化の分析結果"
    prompt:
      template: |
        【あなたの役割】
        あなたはマーケティング戦略の専門家です。顧客像と製品利用状況を包括的に分析してください。

        【分析対象】
        #自社製品
        {{own_product}}
        #競合製品
        {{competitor_products}}

        【分析対象トリガー】
        #トリガー
        {{trigger}}

        【タスク内容】
        1. **Who（顧客像）分析**
           - 顧客特性：心理的特性（価値観、ライフスタイル）、行動特性（購買パターン、ブランド忠誠度）
        2. **利用シーンと状況設定**
           - シーン名、状況設定、ユーザーの目標、ペインポイント、感情的効果
        3. **製品導入による変化**
           - 生活変化：具体的な行動・習慣の変化
           - 感情変化：購入直後〜継続使用による心理状態の変化
      variables:
        - name: own_product
          source: config-params.own-product
          description: 自社製品品番
        - name: competitor_products
          source: config-params.competitor-products
          description: 競合製品品番
        - name: trigger
          source: why-analysis.triggers
          description: 分析対象トリガー
    metadata:
      output_name: who_品番別_ローンチ前
      scenes: "4P企画, SNS/広告TD/コピー, セールストーク"

connections:
  # ── config-params → 各分析ステップ ──
  - id: c-cfg-why-own
    sourceNodeId: config-params
    sourcePortId: own-product
    targetNodeId: why-analysis
    targetPortId: own-product
  - id: c-cfg-why-comp
    sourceNodeId: config-params
    sourcePortId: competitor-products
    targetNodeId: why-analysis
    targetPortId: competitor-products
  - id: c-cfg-what-own
    sourceNodeId: config-params
    sourcePortId: own-product
    targetNodeId: what-analysis
    targetPortId: own-product
  - id: c-cfg-what-comp
    sourceNodeId: config-params
    sourcePortId: competitor-products
    targetNodeId: what-analysis
    targetPortId: competitor-products
  - id: c-cfg-who-own
    sourceNodeId: config-params
    sourcePortId: own-product
    targetNodeId: who-analysis
    targetPortId: own-product
  - id: c-cfg-who-comp
    sourceNodeId: config-params
    sourcePortId: competitor-products
    targetNodeId: who-analysis
    targetPortId: competitor-products

  # ── input-data → why-analysis ──
  - id: c-data-why
    sourceNodeId: input-data
    sourcePortId: reviews
    targetNodeId: why-analysis
    targetPortId: context-data
    label: レビュー等のコンテキストデータ

  # ── input-data → what-analysis ──
  - id: c-data-what
    sourceNodeId: input-data
    sourcePortId: store-report
    targetNodeId: what-analysis
    targetPortId: context-data
    label: 店頭接点レポート等

  # ── Why → What（トリガー） ──
  - id: c-why-what-trigger
    sourceNodeId: why-analysis
    sourcePortId: triggers
    targetNodeId: what-analysis
    targetPortId: trigger

  # ── Why → Who ──
  - id: c-why-who-trigger
    sourceNodeId: why-analysis
    sourcePortId: triggers
    targetNodeId: who-analysis
    targetPortId: trigger
  - id: c-why-who-result
    sourceNodeId: why-analysis
    sourcePortId: why-result
    targetNodeId: who-analysis
    targetPortId: why-result

  # ── What → Who ──
  - id: c-what-who
    sourceNodeId: what-analysis
    sourcePortId: what-result
    targetNodeId: who-analysis
    targetPortId: what-result

variants:
  # ══════════════════════════════════════════════════
  # Variant 1: NA0K（ヘアドライヤー）サイトストーリー生成
  # ══════════════════════════════════════════════════
  - id: na0k-story-flow
    name: ヘアドライヤー（NA0K）サイトストーリー生成
    conditions:
      product-type: na0k
    addSteps:
      # ── 構成案（Why重視 Ver） ──
      - id: story-why-ver
        name: 構成案（Why重視 Ver）
        category: llm
        summary: Why分析結果を重視したサイトストーリー構成案を生成
        description: |
          「なぜこの製品を選ぶべきか」という合理的な理由を軸に構成案を生成する。
          他社比較やコスト換算を用いて長期的・経済的なメリットを論理的に提示し、
          高価格帯製品への心理的障壁を取り払う構成を目指す。
        inputs:
          - id: why-result
            label: Why分析結果
            dataType: html
            description: Why分析の出力（Job/ペインポイント/トリガー）
            required: true
          - id: what-result
            label: What分析結果
            dataType: html
            description: What分析の出力（USP/差別化/ベネフィット）
            required: true
          - id: who-result
            label: Who分析結果
            dataType: html
            description: Who分析の出力（顧客像/利用シーン）
            required: true
          - id: promo-site
            label: 商品プロモ現行サイト
            dataType: json
            description: 商品プロモ検討会の資料内「Webサイト構成案」
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: 現行製品サイトデータ
            required: true
        outputs:
          - id: story-draft
            label: 構成案（Why Ver）
            dataType: html
            description: Why重視のストーリー構成案
        artifacts:
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/na0k/story-why-ver.html
        metadata:
          output_name: 構成案（Why重視軸 Ver）

      # ── 構成案（What重視 Ver） ──
      - id: story-what-ver
        name: 構成案（What重視 Ver）
        category: llm
        summary: What分析結果を重視したサイトストーリー構成案を生成
        description: |
          製品の機能（スペック）と具体的な利便性を中心に構成案を生成する。
          技術的根拠や多彩なモード、具体的な使用方法、FAQなどを網羅的に提示し、
          製品の高性能さと信頼性を納得させる構成を目指す。
        inputs:
          - id: why-result
            label: Why分析結果
            dataType: html
            description: Why分析の出力
            required: true
          - id: what-result
            label: What分析結果
            dataType: html
            description: What分析の出力
            required: true
          - id: who-result
            label: Who分析結果
            dataType: html
            description: Who分析の出力
            required: true
          - id: promo-site
            label: 商品プロモ現行サイト
            dataType: json
            description: 商品プロモ検討会の資料内「Webサイト構成案」
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: 現行製品サイトデータ
            required: true
        outputs:
          - id: story-draft
            label: 構成案（What Ver）
            dataType: html
            description: What重視のストーリー構成案
        artifacts:
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/na0k/story-what-ver.html
        metadata:
          output_name: 構成案（What重視軸 Ver）

      # ── 構成案（Who重視 Ver） ──
      - id: story-who-ver
        name: 構成案（Who重視 Ver）
        category: llm
        summary: Who分析結果を重視したサイトストーリー構成案を生成
        description: |
          ユーザーのライフスタイルや感情の変化にフォーカスし、
          ストーリー形式で製品価値を伝える構成案を生成する。
          「これは自分のための製品だ」という強い共感を生む構成を目指す。
        inputs:
          - id: why-result
            label: Why分析結果
            dataType: html
            description: Why分析の出力
            required: true
          - id: what-result
            label: What分析結果
            dataType: html
            description: What分析の出力
            required: true
          - id: who-result
            label: Who分析結果
            dataType: html
            description: Who分析の出力
            required: true
          - id: promo-site
            label: 商品プロモ現行サイト
            dataType: json
            description: 商品プロモ検討会の資料内「Webサイト構成案」
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: 現行製品サイトデータ
            required: true
        outputs:
          - id: story-draft
            label: 構成案（Who Ver）
            dataType: html
            description: Who重視のストーリー構成案
        artifacts:
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/na0k/story-who-ver.html
        metadata:
          output_name: 構成案（Who重視軸 Ver）

      # ── ハルシネーションチェック x3 ──
      - id: hallcheck-why
        name: ハルシネーションチェック（Why Ver）
        category: llm
        summary: Why重視構成案を現行サイトと照合してファクトチェック
        description: |
          Why重視構成案の内容を現行サイトの情報と照合し、
          事実と異なる記述やハルシネーションがないかチェックする。
        inputs:
          - id: story-draft
            label: 構成案
            dataType: html
            description: チェック対象の構成案
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: ファクトチェック用の正解データ
            required: true
        outputs:
          - id: checked-story
            label: チェック済構成案
            dataType: html
            description: ハルシネーションチェック済の構成案

      - id: hallcheck-what
        name: ハルシネーションチェック（What Ver）
        category: llm
