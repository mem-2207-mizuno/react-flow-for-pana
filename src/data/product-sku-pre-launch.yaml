  # ══════════════════════════════════════════════════
  # Variant 2: N510D（炊飯器）サイトストーリー生成
  # ══════════════════════════════════════════════════
  - id: n510d-story-flow
    name: 炊飯器（N510D）サイトストーリー生成
    conditions:
      product-type: n510d
    addSteps:
      # ── ストーリー（ドライヤー Story Ver） ──
      - id: story-dryer-ver
        name: ストーリー（ドライヤー Story Ver）
        category: llm
        summary: ドライヤーStoryを参照パターンとしてストーリーを生成
        description: |
          ドライヤー(EH-NA0K)の構成やトーンをモデルに、
          炊飯器(SR-N510D)の分析データを情緒的な価値訴求へ昇華させる。
          ターゲットの悩み（ペインポイント）への共感から入り、
          「理想の未来」を提示する構成を構築する。
        inputs:
          - id: why-result
            label: Why分析結果
            dataType: html
            description: Why分析の出力
            required: true
          - id: what-result
            label: What分析結果
            dataType: html
            description: What分析の出力
            required: true
          - id: who-result
            label: Who分析結果
            dataType: html
            description: Who分析の出力
            required: true
          - id: dryer-story
            label: ドライヤーStory
            dataType: html
            description: NA0Kの完成版ストーリー（構成・トーン参照用）
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: 現行製品サイトデータ
            required: true
        outputs:
          - id: story-draft
            label: ストーリー（ドライヤー Ver）
            dataType: html
            description: ドライヤーStory参照パターンのストーリー
        prompt:
          template: |
            # Role
            あなたは世界トップクラスのプロダクトマーケティング・コピーライターであり、Webコンテンツストラテジストです。
            提供された3つの分析データ（What, Who, Why）に基づき、読者の感情を揺さぶり、購買行動を促す「ストーリーテリング型の商品紹介ページ（LP）」の構成と原稿を作成してください。

            # Input Data
            以下の3つの分析データを参照してコンテンツを作成してください。

            1. **Whatデータ（製品機能・差別化要因）**:
            {{what_data}}

            2. **Whoデータ（顧客像・利用シーン）**:
            {{who_data}}

            3. **Whyデータ（購入動機・インサイト）**:
            {{why_data}}

            # Output Structure Target
            参照元となるドライヤーStory（{{dryer_story}}）の構成とトーン＆マナーを模倣します。単なるスペック表ではなく、情緒的な価値訴求を行ってください。

            # Content Requirements & Mapping Instructions
            以下のセクション構成に従って出力してください。

            ## 1. H1タイトル & キャッチコピー
            - タイトル: 製品名と簡潔な概要
            - タグライン: Whyデータの「感情的Job」とWhoデータの「生活変化」を組み合わせた情緒的ベネフィット
            - サブタイトル: Whatデータの「コアUSP」とWhoデータの「機能的Job」の組み合わせ

            ## 2. ヒーローエリア（ファーストビュー要素）
            - メインビジュアル案: Whoデータの「利用シナリオ」に基づく提案
            - メインコピー: 最も強い感情的価値（Whyデータより）
            - バリュープロポジション: Whatデータの「主要な差別化要素」から3つ

            ## 3. 問題提起（共感セクション）
            - ターゲットの課題: Whyデータの「ペインポイント」とWhoデータの「心理的特性」
            - 理想と現実のギャップ

            ## 4. 製品紹介（解決策の提示）
            - 解決宣言 + 主要機能と価値（4つのFeature Box）

            ## 5. デザイン & テクノロジー
            ## 6. 使用シーン（Whoの具体化）
            ## 7. ベネフィット比較と長期的価値
            ## 8. ユーザーの声（社会的証明）
            ## 9. FAQ & CTA

            # Formatting Rules
            - トーン＆マナー: 専門的でありながら親しみやすく、共感的
            - 出力形式: HTMLタグは使用せず、Markdown形式で出力
          variables:
            - name: what_data
              source: what-analysis.what-result
              description: What分析結果（製品機能・差別化要因）
            - name: who_data
              source: who-analysis.who-result
              description: Who分析結果（顧客像・利用シーン）
            - name: why_data
              source: why-analysis.why-result
              description: Why分析結果（購入動機・インサイト）
            - name: dryer_story
              source: story-input-data.dryer-story
              description: ドライヤーStory（構成・トーン参照元）
        artifacts:
          - type: prompt
            label: プロンプト
            url: /artifacts/n510d/story-dryer-ver-prompt.txt
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/n510d/story-dryer-ver.html
        metadata:
          output_name: ストーリー（ドライヤーStory Ver）

      # ── ストーリー（PIM Ver） ──
      - id: story-pim-ver
        name: ストーリー（PIM Ver）
        category: llm
        summary: PIM情報を主軸にストーリーを生成
        description: |
          PIM（公式スペック）と顧客理解(What/Who/Why)を組み合わせ、
          感情的な共感から技術的な納得へつなげるストーリーテリング型LPを生成する。
          用語の正確性と顧客インサイトへの訴求を両立させる。
        inputs:
          - id: why-result
            label: Why分析結果
            dataType: html
            description: Why分析の出力
            required: true
          - id: what-result
            label: What分析結果
            dataType: html
            description: What分析の出力
            required: true
          - id: who-result
            label: Who分析結果
            dataType: html
            description: Who分析の出力
            required: true
          - id: pim-data
            label: PIM情報
            dataType: json
            description: Product Information Management データ
            required: true
          - id: dryer-story
            label: ドライヤーStory
            dataType: html
            description: NA0Kの完成版ストーリー（構成参照用）
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: 現行製品サイトデータ
            required: true
        outputs:
          - id: story-draft
            label: ストーリー（PIM Ver）
            dataType: html
            description: PIM情報主軸のストーリー
        prompt:
          template: |
            # Role
            あなたは、大手家電メーカーのWebコンテンツ制作責任者兼、敏腕セールスライターです。
            公式スペック情報（PIM）の正確さと、マーケティング分析データ（What/Who/Why）に基づいた顧客心理への訴求を両立させた、高品質な「ストーリーテリング型ランディングページ（LP）」の構成案を作成してください。

            # Input Data
            以下の4つのデータを参照してコンテンツを作成してください。

            1. **PIMデータ（公式情報・用語・スペック）**:
            {{pim_data}}

            2. **Whatデータ（機能的価値・競合比較）**:
            {{what_data}}

            3. **Whoデータ（ターゲット・利用シーン）**:
            {{who_data}}

            4. **Whyデータ（インサイト・購入動機）**:
            {{why_data}}

            # Output Strategy
            「感情的な共感から入り、技術的な納得感でクロージングする」構成を目指します。

            **【重要：情報の使い分けルール】**
            * 用語・機能名: 必ずPIMデータの正確な表記を使用する
            * 訴求内容・文脈: Whyデータの「悩み」やWhoデータの「利用シーン」と紐づけて語る
            * 強みの補強: Whatデータにある競合優位性をPIM情報の補足として盛り込む

            # Content Structure
            ## 1. ヘッダーエリア（H1タイトル + メインキャッチ + サブキャッチ）
            ## 2. ヒーロービジュアルの提案
            ## 3. 共感ストーリー（導入）
            ## 4. ソリューション（Feature 1-3）
            ## 5. テクニカル・ディープダイブ
            ## 6. ライフスタイル提案（Who）
            ## 7. 信頼と実績（Social Proof + Q&A）
            ## 8. クロージング (CTA)

            # Tone & Manner
            - 信頼感: メーカー公式としての品格を保つ
            - 共感性: ユーザーの生活に寄り添う温かみ
            - 明快さ: 専門用語は使いつつ、ベネフィットは直感的に伝わるように
          variables:
            - name: pim_data
              source: story-input-data.pim-data
              description: PIM情報（公式スペック・用語）
            - name: what_data
              source: what-analysis.what-result
              description: What分析結果（機能的価値・競合比較）
            - name: who_data
              source: who-analysis.who-result
              description: Who分析結果（ターゲット・利用シーン）
            - name: why_data
              source: why-analysis.why-result
              description: Why分析結果（インサイト・購入動機）
        artifacts:
          - type: prompt
            label: プロンプト
            url: /artifacts/n510d/story-pim-ver-prompt.txt
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/n510d/story-pim-ver.html
        metadata:
          output_name: ストーリー（PIM Ver）

      # ── ストーリー（現行サイト Ver） ──
      - id: story-site-ver
        name: ストーリー（現行サイト Ver）
        category: llm
        summary: 現行サイトを主軸にストーリーを生成
        description: |
          現行サイトの情報設計をベースに、キャッチコピーの刷新やビジュアル指示の追加、
          実証データの強調を行い、Webページとして直感的に魅力が伝わるレイアウトに再構成する。
        inputs:
          - id: why-result
            label: Why分析結果
            dataType: html
            description: Why分析の出力
            required: true
          - id: what-result
            label: What分析結果
            dataType: html
            description: What分析の出力
            required: true
          - id: who-result
            label: Who分析結果
            dataType: html
            description: Who分析の出力
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: 現行製品サイトデータ（主軸）
            required: true
          - id: dryer-story
            label: ドライヤーStory
            dataType: html
            description: NA0Kの完成版ストーリー（トーン参照用）
            required: true
        outputs:
          - id: story-draft
            label: ストーリー（現行サイト Ver）
            dataType: html
            description: 現行サイト主軸のストーリー
        artifacts:
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/n510d/story-site-ver.html
        metadata:
          output_name: ストーリー（現行サイト Ver）

      # ── ハルシネーションチェック x3 ──
      - id: hallcheck-dryer
        name: ハルシネーションチェック（ドライヤー Ver）
        category: llm
        summary: ドライヤーVerストーリーを現行サイトと照合してファクトチェック
        description: |
          ドライヤーStory参照パターンのストーリーを現行サイトと照合し、
          事実と異なる記述やハルシネーションがないかチェックする。
        inputs:
          - id: story-draft
            label: ストーリー
            dataType: html
            description: チェック対象のストーリー
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: ファクトチェック用の正解データ
            required: true
        outputs:
          - id: checked-story
            label: チェック済ストーリー
            dataType: html
            description: ハルシネーションチェック済のストーリー

      - id: hallcheck-pim
        name: ハルシネーションチェック（PIM Ver）
        category: llm
        summary: PIM Verストーリーを現行サイトと照合してファクトチェック
        description: |
          PIM情報主軸ストーリーを現行サイトと照合し、
          事実と異なる記述やハルシネーションがないかチェックする。
        inputs:
          - id: story-draft
            label: ストーリー
            dataType: html
            description: チェック対象のストーリー
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: ファクトチェック用の正解データ
            required: true
        outputs:
          - id: checked-story
            label: チェック済ストーリー
            dataType: html
            description: ハルシネーションチェック済のストーリー

      - id: hallcheck-site
        name: ハルシネーションチェック（現行サイト Ver）
        category: llm
        summary: 現行サイトVerストーリーをファクトチェック
        description: |
          現行サイト主軸ストーリーを現行サイトと照合し、
          事実と異なる記述やハルシネーションがないかチェックする。
        inputs:
          - id: story-draft
            label: ストーリー
            dataType: html
            description: チェック対象のストーリー
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: ファクトチェック用の正解データ
            required: true
        outputs:
          - id: checked-story
            label: チェック済ストーリー
            dataType: html
            description: ハルシネーションチェック済のストーリー

      # ── 比較分析 ──
      - id: comparative-analysis
        name: 比較分析
        category: llm
        summary: 3種のチェック済ストーリーを多角的に比較・評価
        description: |
          3種のチェック済ストーリーと元のストーリー、現行サイトを入力として比較分析を行う。
          Good（良い点）、Improve（改善点）、Fact Check（事実誤認の確認）の観点で評価し、
          各案の優れた要素を論理的に統合した「最強の統合案」を策定する。
        inputs:
          - id: checked-dryer
            label: チェック済（ドライヤー Ver）
            dataType: html
            description: チェック済のドライヤーVerストーリー
            required: true
          - id: checked-pim
            label: チェック済（PIM Ver）
            dataType: html
            description: チェック済のPIM Verストーリー
            required: true
          - id: checked-site
            label: チェック済（現行サイト Ver）
            dataType: html
            description: チェック済の現行サイトVerストーリー
            required: true
          - id: current-site
            label: 現行サイト
            dataType: html
            description: 比較基準の現行サイトデータ
            required: true
        outputs:
          - id: analysis-result
            label: 比較分析結果
            dataType: html
            description: 3種ストーリーの比較分析結果と統合案
        prompt:
          template: |
            Webサイト構成案 比較分析プロンプト
            あなたは熟練したWebマーケター、UXリサーチャー、およびコピーライターです。
            以下の入力情報に基づき、「現行のWebサイト」と「新しい構成案（複数）」を比較分析し、最適なWebサイト構成を導き出すためのレポートを作成してください。

            ■ 入力情報
            1. 現行のWebサイト情報 (Current Status)
            {{current_site}}

            2. 新構成案 A (Proposal A)
            {{proposal_a}}

            3. 新構成案 B (Proposal B)
            {{proposal_b}}

            4. 新構成案 C (Proposal C)
            {{proposal_c}}

            ■ 分析指示 (Instructions)
            Step 1: 現行サイトの課題抽出
            - 現行サイトが「機能的価値（スペック）」と「情緒的価値（ベネフィット）」のどちらに偏っているか分析
            - 購買意欲を削いでいるボトルネック（情報の欠落、共感の欠如など）を特定

            Step 2: 各構成案の比較評価
            - Good (良い点): ターゲットインサイトへの刺さり具合、USPの表現、UI/UX
            - Improve (改善点・懸念点): 説明不足、情緒過多、論理の飛躍など
            - Fact Check (重要): 現行サイトのスペック情報と照らし合わせ、事実誤認がないか厳密にチェック

            Step 3: 最終推奨案の策定（ハイブリッド提案）
            - 最もベースとして優れている案を選定し、他案の優れた要素を取り込んだ「統合ハイブリッド案」を提案
            - なぜその組み合わせが最強なのか、根拠を論理的に説明

            ■ 出力形式: HTML形式（インラインCSS付き）
            ■ 出力言語: 日本語
          variables:
            - name: current_site
              source: story-input-data.current-site
              description: 現行Webサイト情報
            - name: proposal_a
              source: hallcheck-dryer.checked-story
              description: 構成案A（ドライヤー Story Ver チェック済）
            - name: proposal_b
              source: hallcheck-pim.checked-story
              description: 構成案B（PIM Ver チェック済）
            - name: proposal_c
              source: hallcheck-site.checked-story
              description: 構成案C（現行サイト Ver チェック済）
        artifacts:
          - type: prompt
            label: プロンプト
            url: /artifacts/n510d/comparative-analysis-prompt.txt
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/n510d/comparative-analysis.html

      # ── 最終版ストーリー ──
      - id: final-story-n510d
        name: 最終版ストーリー
        category: output
        summary: 比較分析結果と3構成案を統合して最終ストーリーを生成
        description: |
          3つの構成案（A:情緒, B:実利, C:Web骨子）と比較分析結果を統合し、
          最終決定版のWebサイト原稿をHTML形式で出力する。
          C案をベース骨子に、A案の情緒・共感要素とB案の実利データを統合する。
        inputs:
          - id: story-a
            label: 構成案A（ドライヤー Story Ver）
            dataType: html
            description: 情緒・共感要素の参照元
            required: true
          - id: story-b
            label: 構成案B（PIM Ver）
            dataType: html
            description: 数値データ・実利要素の参照元
            required: true
          - id: story-c
            label: 構成案C（現行サイト Ver）
            dataType: html
            description: Web骨子・構造のベース
            required: true
          - id: analysis-result
            label: 比較分析結果
            dataType: html
            description: 3種ストーリーの比較分析結果と統合案
            required: true
          - id: section-list
            label: セクション一覧
            dataType: json
            description: サイトのセクション構成一覧（7セクション）
            required: true
        outputs:
          - id: final-output
            label: 最終版ストーリー
            dataType: html
            description: 最終版サイトストーリー（HTML形式）
        prompt:
          template: |
            あなたは熟練のWebコピーライター兼UIデザイナーです。
            Panasonicの炊飯器「SR-N510D」のWebサイトリニューアルに向け、3つの構成案（A, B, C）を統合した最終決定版のWebサイト原稿を、1つのHTMLファイルとして出力してください。

            # 参照ファイルと役割
            - ベース（骨子）: {{story_c}}（C案）— Webサイトとしての読みやすさ、見出し階層、ビジュアル指示の形式を維持
            - 情緒・共感要素: {{story_a}}（A案）— キャッチコピーの温度感、問題提起、競合比較テーブル
            - 解決策・実利要素: {{story_b}}（B案）— 数値データ、お手入れ訴求、メカニズム解説

            # 統合指示（セクションごとの構成ルール）
            {{compare_result}} の「最終推奨案 (The Hybrid Proposal)」に従い、以下のフローで構成:

            1. Hero Area (FV): C案のビジュアル指示 + A案のメインコピー + C案のサブコピー
            2. Introduction (共感): A案の共感パート
            3. USP 1 (美味しさ): C案構造 + B案の数値データとメカニズム解説
            4. USP 2 (お手入れ): C案ベース + B案の「洗うのは2点」「食洗機対応」を強調
            5. Lifestyle (使用シーン): C案の3シーン
            6. Comparison (納得感): A案の比較テーブル
            7. Specs & CTA: C案のスペック表とCTA

            # 出力形式
            - 単一のHTMLファイル（インラインCSS付き）
            - ビジュアル指示（Visual Instruction）はC案のスタイルを踏襲
          variables:
            - name: story_a
              source: story-dryer-ver.story-draft
              description: 構成案A（ドライヤー Story Ver）— 情緒・共感要素
            - name: story_b
              source: story-pim-ver.story-draft
              description: 構成案B（PIM Ver）— 実利・数値データ
            - name: story_c
              source: story-site-ver.story-draft
              description: 構成案C（現行サイト Ver）— Web骨子
            - name: compare_result
              source: comparative-analysis.analysis-result
              description: 比較分析結果（統合推奨案）
        artifacts:
          - type: prompt
            label: プロンプト
            url: /artifacts/n510d/final-story-prompt.txt
          - type: output
            label: アウトプット（HTML）
            url: /artifacts/n510d/final-story.html

